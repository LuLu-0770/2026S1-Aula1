<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Pagina de links ||</title>
    <style>
        body {
            background-color: rgb(10, 20, 30);
        }
        a{
            text-decoration: none;
            font-family: sans-serif;
            font-size: 20px ;
            color: rgb(247, 6, 247);
            border-radius: 30px 10px 10px;
            border: solid 1px #fff ;
            padding: 10px;
            margin-right: 4%;
            
        }
        a:hover{
            box-shadow: 3px 3px 4px;
            font-size: 25px;
            transition: 0.3s;
            border-radius: 35px 15px 15px;
            border-bottom: 2px rgb(153, 25, 165);
            text-decoration: none;

        }
    </style>
</head>

<body>
    <h1>pagina de links
    </h1>
    <a href="./pagina1.Html" target="_blank">Minha pagina 1</a>
    <a href="./pagina2.Html" target="_self">Minha pagina 2</a>
    <a href="https://www.facens.br/" target="_top">UniFacens</a>
    
</body>
</html>
